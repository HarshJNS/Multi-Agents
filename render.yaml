services:
  - type: web
    name: agent-studio
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false

